<!DOCTYPE html>

<html data-theme="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<meta content="Tiny Turn RPG local profile (stored only in your browser)." name="description"/>
<title>Tiny Turn RPG — Local Profile</title>
<link href="./favicon.ico" rel="icon" sizes="any"/>
<link href="./favicon.png" rel="icon" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:wght@600;700;800&amp;family=Cinzel:wght@500;700&amp;family=Crimson+Pro:ital,wght@0,400;0,600;1,400;1,600&amp;display=swap" rel="stylesheet"/><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/><link href="https://fonts.googleapis.com" rel="preconnect"/><link href="./styles.css" rel="stylesheet"/>
</head>
<body class="quizPage">
<a class="skip-link" href="#main">Skip to content</a>
<div id="top"></div>
<header class="header" role="banner">
<nav aria-label="Primary" class="nav container">
<a aria-label="Home" class="brand" href="./index.html#top">
<span class="brandText">Tiny Turn RPG</span>
</a>
<button aria-controls="navLinks" aria-expanded="false" class="iconBtn navToggle" id="navToggle">
<span class="srOnly">Open menu</span>
<span aria-hidden="true" class="hamburger"></span>
</button>
<div class="navLinks" id="navLinks">
<a href="./index.html">Game</a>
<div class="profileMenu" data-default-display="inline-flex" id="profileMenu" style="display: none">
<button aria-controls="profileMenuList" aria-expanded="false" aria-haspopup="menu" aria-label="Open account menu" class="btn ghost profileTrigger" id="profileMenuToggle" type="button">
<span class="srOnly">Profile</span>
<span class="profileAvatar profileAvatar--menu" id="profileAvatar">
<span aria-hidden="true" class="profileAvatarPlaceholder">
<svg focusable="false" role="presentation" viewbox="0 0 24 24">
<path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5Zm0 2c-3.33 0-10 1.67-10 5v1h20v-1c0-3.33-6.67-5-10-5Z" fill="currentColor"></path>
</svg>
</span>
<img alt="" loading="lazy"/>
</span>
<span aria-hidden="true" class="profileCaret">▾</span>
</button>
<div aria-hidden="true" class="profileMenuList" id="profileMenuList" role="menu">
<a href="./login.html" role="menuitem">Local profile</a>
<button id="logoutBtn" role="menuitem" type="button">Log out</button>
</div>
</div>
<a class="btn primary magentaGlow" data-auth-target="login-cta" href="./login.html">Open the login portal</a>
</div>
</nav>
</header>
<main id="main">
<section class="section">
<div class="container" style="max-width: 760px;">
<div class="card">
<h1 style="margin-top: 0;">Local profile</h1>
<p class="muted">
            This “login” is <strong>local-only</strong>: it saves a tiny profile in your browser (via <code>localStorage</code>).
            No database. No accounts. Nothing leaves your device.
          </p>
<form class="postForm" id="localLoginForm" style="display: grid; gap: 12px;">
<label class="field">
<span>Display name (optional)</span>
<input id="localDisplayName" maxlength="40" name="displayName" placeholder="e.g., Archivist Cheese" type="text"/>
</label>
<div class="actions" style="display:flex; gap:10px; flex-wrap:wrap;">
<button class="btn primary" type="submit">Save profile</button>
<button class="btn ghost" id="continueGuest" type="button">Continue as guest</button>
</div>
<p aria-live="polite" class="muted small" id="localAuthStatus"></p>
</form>
</div>
</div>
</section>
</main>
<footer class="footer" role="contentinfo">
<div class="container footerInner">
<a aria-label="Tiny Turn RPG home" class="footerMark" href="./index.html#top">
<span class="footerMarkText">Tiny Turn RPG</span>
</a>
<nav aria-label="Footer" class="footerNav">
<a href="./index.html">Game</a>
<a href="#top">Back to top</a>
</nav>
</div>
<div class="container footerBottom">
<p class="muted small">© <span id="year"></span> Tiny Turn RPG.</p>
<div class="footerBottomLinks">
<a class="muted small" href="#top">Back to top ↑</a>
</div>
</div>
</footer>
<script defer="" src="./script.js"></script>
<script defer="" src="./js/localAuth.js"></script>
</body>
</html>
